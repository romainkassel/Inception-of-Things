apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-simple
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'http://gitlab-webservice-default.gitlab.svc.cluster.local:8181/root/iot-app-rkassel.git'
    targetRevision: HEAD
    path: 'confs' # Folder that contains conf files related to app (deployment + service)
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: dev # Namespace related to app
  syncPolicy:
    automated: {} # Enables automated sync
